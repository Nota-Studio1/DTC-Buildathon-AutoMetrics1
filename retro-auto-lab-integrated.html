                          />
                          <span className="absolute right-3 sm:right-4 top-1/2 -translate-y-1/2 text-[10px] sm:text-xs text-white font-black tracking-widest pointer-events-none">
                            {units.distance.toUpperCase()}
                          </span>
                        </div>
                      </div>
                    </div>

                    {/* EV economics */}
                    <div className="mt-8 bg-black border-4 border-[var(--line)] p-4 sm:p-6">
                      <div className="flex items-center justify-between gap-3 flex-wrap">
                        <div className="flex items-center gap-3">
                          <Icon name="Globe" size={20} className="text-[var(--amber)]" />
                          <div className="text-xs sm:text-sm font-black uppercase tracking-widest text-white">Electric / Grid Overrides</div>
                        </div>
                        <span className="text-[10px] sm:text-xs font-mono uppercase tracking-widest font-black text-zinc-500">
                          Used for EV cost + emissions
                        </span>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6 mt-4">
                        <div className="space-y-2">
                          <RetroLabel>Electricity Rate ($/kWh)</RetroLabel>
                          <RetroInput
                            inputMode="decimal"
                            value={electricityPriceInput}
                            onChange={(e) => setElectricityPriceInput(e.target.value.replace(/[^0-9.]/g, ""))}
                            placeholder="0.15"
                          />
                        </div>
                        <div className="space-y-2">
                          <RetroLabel>Grid Intensity (gCO2/kWh)</RetroLabel>
                          <RetroInput
                            inputMode="decimal"
                            value={gridIntensityInput}
                            onChange={(e) => setGridIntensityInput(e.target.value.replace(/[^0-9.]/g, ""))}
                            placeholder="400"
                          />
                        </div>
                      </div>
                    </div>
                  </Section>

                  <Section title="Eco Coach & Trip Planner" badge="SEC. B2 - CARBON OPS" icon="Leaf">
                    <div className="space-y-6 mt-2">
                      <div className="bg-black border-2 border-[var(--line)] p-4 sm:p-5">
                        <div className="flex items-center gap-2 mb-3">
                          <Icon name="Info" size={18} className="text-[var(--teal)] shrink-0" />
                          <span className="text-[10px] sm:text-xs font-mono uppercase tracking-widest font-black text-zinc-400">
                            Personalized suggestions (general guidance—not a replacement for your owner's manual or safe driving).
                          </span>
                        </div>
                        {stats ? (
                          <ul className="list-disc pl-5 space-y-2 text-xs sm:text-sm text-zinc-200 font-bold leading-relaxed">
                            {ecoTips.map((t, i) => (
                              <li key={i} className="marker:text-[var(--amber)]">
                                {t}
                              </li>
                            ))}
                          </ul>
                        ) : (
                          <div className="text-[10px] sm:text-xs font-mono uppercase tracking-widest font-black text-zinc-500">
                            Configure a vehicle and distance above to unlock tailored eco tips.
                          </div>
                        )}
                      </div>

                      <div className="bg-black border-4 border-[var(--line)] p-4 sm:p-6 space-y-4">
                        <div className="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-3">
                          <div className="flex items-center gap-3 text-white min-w-0">
                            <Icon name="MapPin" size={22} className="text-[var(--amber)] shrink-0" />
                            <div>
                              <div className="text-xs sm:text-sm font-black uppercase tracking-widest">Fuel-smart route compare</div>
                              <div className="text-[10px] sm:text-xs font-mono text-zinc-500 uppercase tracking-widest font-bold mt-1">
                                Geocode (Photon) + driving geometry (OSRM demo). We rank by shortest distance as a practical proxy for minimum fuel/energy for the same vehicle.
                              </div>
                            </div>
                          </div>
                          <a
                            className="focus-ring shrink-0 text-[10px] sm:text-xs font-black uppercase tracking-widest text-[var(--sky)] border border-[var(--line)] px-3 py-2 hover:border-[var(--amber)]"
                            href={
                              routeFromInput && routeToInput
                                ? `https://www.google.com/maps/dir/${encodeURIComponent(routeFromInput)}/${encodeURIComponent(routeToInput)}`
                                : "https://www.google.com/maps"
                            }
                            target="_blank"
                            rel="noreferrer"
                          >
                            Open in Maps
                          </a>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                          <div className="space-y-2">
                            <RetroLabel>Start</RetroLabel>
                            <RetroInput
                              placeholder="e.g. 1 Apple Park Way, Cupertino CA"
                              value={routeFromInput}
                              onChange={(e) => setRouteFromInput(e.target.value)}
                              disabled={routeLoading}
                            />
                          </div>
                          <div className="space-y-2">
                            <RetroLabel>Destination</RetroLabel>
                            <RetroInput
                              placeholder="e.g. Stanford University, CA"
                              value={routeToInput}
                              onChange={(e) => setRouteToInput(e.target.value)}
                              disabled={routeLoading}
                            />
                          </div>
                        </div>

                        <div className="flex flex-wrap gap-2">
                          <button
                            type="button"
                            onClick={runRoutePlanner}
                            disabled={routeLoading}
                            className={
                              "focus-ring px-4 py-3 text-xs font-black uppercase tracking-widest border-2 " +
                              (routeLoading
                                ? "bg-[var(--panel)] text-zinc-600 border-[var(--line)] cursor-wait"
                                : "bg-[var(--amber)] text-black border-[var(--amber)] hover:bg-white")
                            }
                          >
                            {routeLoading ? "Routing + Syncing Map…" : "Compare routes + Map"}
                          </button>
                          {routeResults.length ? (
                            <button
                              type="button"
                              onClick={applyBestRouteDistance}
                              className="focus-ring bg-black border-2 border-[var(--line)] hover:border-[var(--teal)] px-4 py-3 text-xs font-black uppercase tracking-widest text-zinc-200"
                              title="Copy shortest-route miles into Target RNG (one-way leg)"
                            >
                              Use shortest distance in Target RNG
                            </button>
                          ) : null}
                        </div>

                        {routeError ? (
                          <div className="text-[10px] sm:text-xs font-mono uppercase tracking-widest font-black text-[var(--red)] border border-[var(--red)]/40 p-3">
                            {routeError}
                          </div>
                        ) : null}

                        {/* Live Map — always in DOM so Leaflet initialises; revealed after first route */}
                        <div
                          className="crt-screen border-4 border-[var(--line)] overflow-hidden relative mt-4"
                          style={{
                            display: routeGeodata.length ? "block" : "none",
                          }}
                        >
                          <div className="absolute top-2 left-2 z-[1000] flex gap-2 flex-wrap pointer-events-none">
                            <span className="bg-black/80 border border-[var(--amber)] text-[var(--amber)] text-[9px] font-mono font-black uppercase tracking-widest px-2 py-1">
                              NAV_MATRIX // OSRM
                            </span>
                            {routeGeodata.length > 1 && (
                              <span className="bg-black/80 border border-[var(--line)] text-zinc-400 text-[9px] font-mono font-black uppercase tracking-widest px-2 py-1">
                                <span style={{color:"#22c55e"}}>━</span> SHORTEST &nbsp;<span style={{color:"#60a5fa"}}>╌</span> ALT
                              </span>
                            )}
                          </div>
                          <div id="am-map" ref={mapRef} style={{ height: 380 }}></div>
                        </div>

                        {routeEndpoints ? (
                          <div className="text-[10px] sm:text-xs font-mono text-zinc-400 uppercase tracking-widest font-bold">
                            Resolved: <span className="text-white">{routeEndpoints.from}</span>
                            {" → "}
                            <span className="text-white">{routeEndpoints.to}</span>
                          </div>
                        ) : null}

                        {routeResults.length ? (
                          <div className="space-y-3">
                            {routeResults.map((r) => (
                              <div
                                key={r.key}
                                className={
                                  "border-2 p-4 " +
                                  (r.isBestDistance
                                    ? "border-[var(--amber)] bg-[var(--amber)]/10 shadow-[0_0_12px_rgba(34,197,94,0.25)]"
                                    : "border-[var(--line)] bg-[var(--panel)]")
                                }
                              >
                                <div className="flex flex-wrap items-center justify-between gap-2">
                                  <div className="text-sm font-black text-white uppercase tracking-widest">{r.label}</div>
                                  {r.isBestDistance ? (
                                    <span className="text-[10px] font-mono uppercase tracking-widest font-black text-black bg-[var(--amber)] px-2 py-1">
                                      Fewest miles
                                    </span>
                                  ) : null}
                                </div>
                                <div className="mt-3 grid grid-cols-1 sm:grid-cols-2 gap-3 text-[10px] sm:text-xs font-mono font-bold text-zinc-400 uppercase tracking-widest">
                                  <div>
                                    Distance:{" "}
                                    <span className="text-white">
                                      {formatNumber(units.distance === "km" ? r.distMi / MI_PER_KM : r.distMi, 1)} {units.distance.toUpperCase()}
                                    </span>{" "}
                                    <span className="text-zinc-600 normal-case">(~{formatNumber(r.distMi, 1)} mi)</span>
                                  </div>
                                  <div>
                                    Drive time (map):{" "}
                                    <span className="text-white">
                                      {Math.floor(r.durationS / 3600)
                                        ? `${Math.floor(r.durationS / 3600)}h `
                                        : ""}
                                      {Math.floor((r.durationS % 3600) / 60)}m
                                    </span>
                                  </div>
                                </div>
                                <div className="mt-3 grid grid-cols-1 sm:grid-cols-3 gap-3">
                                  <div className="bg-black border border-[var(--line)] p-2">
                                    <div className="text-[10px] text-zinc-500 uppercase font-black">CO₂ (one-way)</div>
                                    <div className="text-sm font-black text-[var(--amber)]">{formatNumber(r.est.totalCO2_kg, 2)} kg</div>
                                  </div>
                                  <div className="bg-black border border-[var(--line)] p-2">
                                    <div className="text-[10px] text-zinc-500 uppercase font-black">Cost (one-way)</div>
                                    <div className="text-sm font-black text-[var(--teal)]">{formatMoney(r.est.totalCost, units.currency)}</div>
                                  </div>
                                  <div className="bg-black border border-[var(--line)] p-2">
                                    <div className="text-[10px] text-zinc-500 uppercase font-black">
                                      {activeMode === "EV" ? "Energy" : "Fuel"}
                                    </div>
                                    <div className="text-sm font-black text-white">
                                      {activeMode === "EV"
                                        ? `${formatNumber(r.est.kwh, 2)} kWh`
                                        : `${formatNumber(r.est.fuelDisplay, 2)} ${r.est.fuelUnit}`}
                                    </div>
                                  </div>
                                </div>
                              </div>
                            ))}

                            {routeResults.length > 1 ? (
                              <div className="text-[10px] sm:text-xs font-mono text-zinc-500 uppercase tracking-widest font-bold leading-relaxed border-t border-[var(--line)] pt-3">
                                Versus longest option here: save ~{" "}
                                <span className="text-[var(--teal)]">
                                  {formatNumber(
                                    routeResults[routeResults.length - 1].est.totalCO2_kg - routeResults[0].est.totalCO2_kg,
                                    2
                                  )}{" "}
                                  kg CO₂
                                </span>{" "}
                                and{" "}
                                <span className="text-[var(--teal)]">
                                  {formatMoney(
                                    routeResults[routeResults.length - 1].est.totalCost - routeResults[0].est.totalCost,
                                    units.currency
                                  )}
                                </span>{" "}
                                on this one-way leg (same vehicle + prices as above). Traffic and driving style still dominate in the real world.
                              </div>
                            ) : (
                              <div className="text-[10px] sm:text-xs font-mono text-zinc-500 uppercase tracking-widest font-bold">
                                Only one drivable variant was returned—try nearby side streets or a different destination pin if your maps app shows a shorter path.
                              </div>
                            )}
                          </div>
                        ) : null}
                      </div>
                    </div>
                  </Section>

                  {/* Presets */}
                  <Section title="Presets" badge="SEC. E - MEMORY BANK" icon="Database">
                    {presets?.length ? (
                      <div className="space-y-3">
                        <div className="text-[10px] sm:text-xs font-mono uppercase tracking-widest font-black text-zinc-500">
                          Saved locally in your browser
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                          {presets.map((p) => (
                            <div key={p.id} className="bg-black border-2 border-[var(--line)] p-3">
                              <div className="flex items-start justify-between gap-3">
                                <div className="min-w-0">
                                  <div className="text-sm font-black text-white truncate">{p.name}</div>
                                  <div className="text-[10px] font-mono text-zinc-500 uppercase tracking-widest font-bold mt-1">
                                    {new Date(p.createdAt).toLocaleString()}
                                  </div>
                                </div>
                                <button
                                  onClick={() => deletePreset(p.id)}
                                  className="focus-ring bg-[var(--panel)] border-2 border-[var(--line)] hover:border-[var(--red)] p-2 shrink-0"
                                  title="Delete preset"
                                >
                                  <Icon name="X" size={16} className="text-[var(--red)]" />
                                </button>
                              </div>
                              <div className="mt-3 flex gap-2">
                                <button
                                  onClick={() => loadPreset(p)}
                                  className="focus-ring flex-1 bg-[var(--amber)] text-black font-black uppercase tracking-widest text-xs py-2 border-2 border-[var(--amber)] hover:bg-white"
                                >
                                  Load
                                </button>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    ) : (
                      <div className="bg-black border-4 border-[var(--line)] p-4 sm:p-6 text-zinc-400">
                        <div className="flex items-center gap-2">
                          <Icon name="Info" size={18} className="text-zinc-500" />
                          <div className="text-[10px] sm:text-xs font-mono uppercase tracking-widest font-black">
                            No presets yet. Configure a vehicle and click “Save Preset”.
                          </div>
                        </div>
                      </div>
                    )}
                  </Section>
                </div>

                {/* Right column */}
                <div className="col-span-1 lg:col-span-5 space-y-6">
                  {/* Telemetry */}
                  <div className="bg-[var(--panel)] border-t-8 border-[var(--line)] border-x-2 border-b-2 p-6 sm:p-10 relative overflow-hidden shadow-[0_10px_30px_rgba(0,0,0,0.8)]">
                    <div className="absolute top-0 right-0 bg-[var(--line)] text-zinc-400 font-mono text-[10px] px-3 py-1 font-bold z-20">
                      SEC. C - TELEMETRY
                    </div>

                    <div className="flex items-center gap-3 text-[var(--amber)] mb-6 sm:mb-8 border-b-2 border-[var(--line)] pb-2">
                      <Icon name="Globe" size={26} className="shrink-0" />
                      <h3 className="text-lg sm:text-xl md:text-2xl font-black uppercase tracking-widest text-white italic leading-tight">
                        Carbon & Cost Telemetry
                      </h3>
                    </div>

                    {stats ? (
                      <>
                        <div className="crt-screen p-4 sm:p-8 border-4 border-[var(--line)] flex flex-col items-center justify-center text-center relative overflow-hidden mb-6 w-full [container-type:inline-size]">
                          <div className="absolute top-2 left-2 text-[10px] text-[var(--amber)] font-mono whitespace-nowrap">
                            CO2_OUTPUT
                          </div>
                          <div className="flex items-baseline justify-center mt-6 sm:mt-4 w-full px-2">
                            <span className="font-black tracking-tighter leading-none text-[var(--amber)] drop-shadow-[0_0_15px_rgba(245,158,11,0.8)] font-mono text-[clamp(2.5rem,15cqi,6rem)] pr-1 sm:pr-2 whitespace-nowrap">
                              {formatNumber(stats.totalCO2_kg, 2)}
                            </span>
                            <span className="text-[clamp(1rem,6cqi,2.5rem)] font-black text-white italic shrink-0 whitespace-nowrap">
                              KG
                            </span>
                          </div>
                          <div className="mt-4 text-[10px] sm:text-xs uppercase tracking-widest font-mono font-black text-zinc-400">
                            Distance:{" "}
                            <span className="text-white">{formatNumber(stats.distanceDisplay, 2)}</span>{" "}
                            {stats.distanceUnit.toUpperCase()}
                          </div>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6 mt-6">
                          <div className="bg-[var(--line)] p-3 sm:p-4 border-b-4 border-r-4 border-black min-w-0 flex flex-col justify-center w-full [container-type:inline-size]">
                            <div className="text-[clamp(0.6rem,4cqi,0.85rem)] text-zinc-300 uppercase font-black tracking-widest mb-1 sm:mb-2 drop-shadow-md leading-tight break-words">
                              Financial Drain
                            </div>
                            <div className="text-[clamp(1.3rem,10cqi,2.5rem)] font-black text-[var(--teal)] font-mono leading-none drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] break-all mt-1">
                              {formatMoney(stats.totalCost, units.currency)}
                            </div>
                          </div>
                          <div className="bg-[var(--line)] p-3 sm:p-4 border-b-4 border-r-4 border-black min-w-0 flex flex-col justify-center w-full [container-type:inline-size]">
                            <div className="text-[clamp(0.6rem,4cqi,0.85rem)] text-zinc-300 uppercase font-black tracking-widest mb-1 sm:mb-2 drop-shadow-md leading-tight break-words">
                              Resource Mass
                            </div>
                            <div className="text-[clamp(1.2rem,9cqi,2.2rem)] font-black text-white font-mono leading-none drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] flex items-baseline break-all mt-1">
                              {activeMode === "EV" ? (
                                <>
                                  <span>{formatNumber(stats.kwh, 2)}</span>
                                  <span className="text-[0.4em] ml-2 opacity-60 italic font-sans shrink-0">kWh</span>
                                </>
                              ) : (
                                <>
                                  <span>{formatNumber(stats.fuelDisplay, 2)}</span>
                                  <span className="text-[0.4em] ml-2 opacity-60 italic font-sans shrink-0">
                                    {stats.fuelUnit}
                                  </span>
                                </>
                              )}
                            </div>
                          </div>
                        </div>

                        <div className="mt-6 bg-black border-2 border-[var(--line)] p-4">
                          <div className="text-[10px] sm:text-xs font-mono uppercase tracking-widest font-black text-zinc-500">
                            Benchmarks (same distance)
                          </div>
                          <div className="mt-3 grid grid-cols-1 sm:grid-cols-3 gap-3">
                            <BenchItem label="Truck" value={`${formatNumber(stats.benchmarks.truckCO2_kg, 1)} kg`} color="text-[var(--red)]" />
                            <BenchItem label="Sedan" value={`${formatNumber(stats.benchmarks.sedanCO2_kg, 1)} kg`} color="text-[var(--teal)]" />
                            <BenchItem label="Hybrid" value={`${formatNumber(stats.benchmarks.hybridCO2_kg, 1)} kg`} color="text-[var(--blue)]" />
                          </div>
                          <div className="mt-4 text-[10px] sm:text-xs font-mono uppercase tracking-widest font-black text-zinc-400">
                            Savings vs Truck:{" "}
                            <span className="text-black bg-[var(--teal)] px-2 py-1 shadow-[0_0_10px_var(--teal)]">
                              +{formatNumber(stats.co2VsTruck_kg, 2)} kg
                            </span>
                          </div>
                          <div className="mt-3 text-[10px] sm:text-xs font-mono uppercase tracking-widest font-black text-zinc-500">
                            Intensity:{" "}
                            <span className="text-white">{formatNumber(stats.co2PerMile_kg * 1000, 0)}</span> gCO2/mi •{" "}
                            <span className="text-white">{formatMoney(stats.costPerMile, units.currency)}</span>/mi
                          </div>
                        </div>
                      </>
                    ) : (
                      <div className="py-16 sm:py-24 flex flex-col items-center justify-center text-white text-center space-y-4 crt-screen border-4 border-[var(--line)]">
                        <Icon name="Info" size={48} className="text-zinc-600" />
                        <p className="text-[10px] sm:text-xs uppercase tracking-widest font-mono font-black px-4 text-zinc-500 animate-pulse">
                          AWAITING_INPUT_SEQ...
                        </p>
                      </div>
                    )}
                  </div>

                  {/* Compare list */}
                  <Section title="Compare" badge="SEC. F - MULTI-SCAN" icon="TrendingUp">
                    {compareStats?.length ? (
                      <div className="space-y-4">
                        <div className="flex items-center justify-between">
                          <div className="text-[10px] sm:text-xs font-mono uppercase tracking-widest font-black text-zinc-500">
                            Up to 4 vehicles
                          </div>
                          <button
                            onClick={clearCompare}
                            className="focus-ring bg-black border-2 border-[var(--line)] hover:border-[var(--red)] px-2 py-1 text-[10px] uppercase tracking-widest font-black text-white"
                          >
                            Clear
                          </button>
                        </div>

                        <div className="space-y-3">
                          {compareStats.map((c) => (
                            <div key={c.key} className="bg-black border-2 border-[var(--line)] p-3">
                              <div className="flex items-start justify-between gap-3">
                                <div className="min-w-0">
                                  <div className="text-sm font-black text-white truncate">{c.label}</div>
                                  <div className="mt-1 text-[10px] font-mono uppercase tracking-widest font-black text-zinc-500">
                                    {c.mode}
                                  </div>
                                </div>
                                <button
                                  onClick={() => removeCompare(c.key)}
                                  className="focus-ring bg-[var(--panel)] border-2 border-[var(--line)] hover:border-[var(--red)] p-2 shrink-0"
                                  title="Remove"
                                >
                                  <Icon name="X" size={16} className="text-[var(--red)]" />
                                </button>
                              </div>

                              <div className="mt-3 grid grid-cols-2 gap-3">
                                <MetricMini label="CO2 (kg)" value={formatNumber(c.stats.totalCO2_kg, 2)} accent="text-[var(--amber)]" />
                                <MetricMini label="Cost" value={formatMoney(c.stats.totalCost, units.currency)} accent="text-[var(--teal)]" />
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    ) : (
                      <div className="bg-black border-4 border-[var(--line)] p-4 sm:p-6 text-zinc-400">
                        <div className="flex items-center gap-2">
                          <Icon name="Info" size={18} className="text-zinc-500" />
                          <div className="text-[10px] sm:text-xs font-mono uppercase tracking-widest font-black">
                            Add vehicles via “Add to Compare”.
                          </div>
                        </div>
                      </div>
                    )}
                  </Section>

                  {/* Terminal */}
                  <div className="bg-black border-4 border-[var(--line)] p-4 sm:p-8 font-mono text-[10px] sm:text-xs md:text-sm text-[var(--amber)] space-y-4 shadow-[inset_0_0_20px_rgba(0,0,0,1)] relative">
                    <div className="absolute top-0 right-0 w-full h-full bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%)] bg-[length:100%_4px] pointer-events-none z-0"></div>
                    <div className="relative z-10">
                      <div className="flex items-center gap-2 sm:gap-3 text-white mb-4 sm:mb-6 font-black uppercase tracking-widest text-[10px] sm:text-sm border-b border-zinc-800 pb-2">
                        <Icon name="Terminal" size={18} className="shrink-0" />
                        <span>DIAGNOSTICS_LOG</span>
                      </div>
                      <div className="space-y-2 sm:space-y-3 opacity-90 leading-relaxed font-bold break-words w-full overflow-hidden">
                        <p className="truncate text-white">{`>> SYS_BOOT [${new Date().toISOString().split("T")[1].split(".")[0]}]`}</p>
                        <p className="truncate text-white">{`>> LOC: ${String(locationLabel).toUpperCase()}`}</p>
                        <p className="truncate">{`>> API_STATUS: ${api.status.ok ? "CONNECTED" : "DEGRADED"} (${api.status.message})`}</p>
                        <p className="truncate">{`>> NAV_MATRIX: ${routeGeodata.length ? `ACTIVE // ${routeGeodata.length} ROUTE(S) RENDERED` : "STANDBY"}`}</p>
                        {stats ? (
                          <p className="text-black bg-[var(--teal)] py-1 px-2 inline-block mt-2 shadow-[0_0_10px_var(--teal)] font-black break-words max-w-full overflow-hidden text-ellipsis">
                            {`>> SAVING: +${formatNumber(stats.co2VsTruck_kg, 2)}KG vs TRUCK`}
                          </p>
                        ) : null}
                        <p className="animate-pulse text-white mt-4 font-black">{`>> LISTENING_FOR_OVERRIDE_KEY...`}</p>
                      </div>
                    </div>
                  </div>

                  {/* Report button */}
                  <button
                    onClick={generateReport}
                    disabled={!stats}
                    className={
                      "focus-ring w-full font-black py-5 sm:py-8 px-2 uppercase tracking-widest sm:tracking-[0.3em] text-xs sm:text-sm md:text-lg transition-all flex items-center justify-center gap-3 sm:gap-6 group italic border-t border-l border-b-8 border-r-8 " +
                      (stats
                        ? "bg-[var(--amber)] text-black border-t-white/50 border-l-white/50 border-b-[var(--amber2)] border-r-[var(--amber2)] hover:bg-white hover:border-b-zinc-400 hover:border-r-zinc-400 active:border-b-0 active:border-r-0 active:translate-y-2 active:translate-x-2 cursor-pointer shadow-[8px_8px_0px_#000]"
                        : "bg-[var(--panel)] text-zinc-600 border-[var(--line)] cursor-not-allowed")
                    }
                  >
                    <div className={stats ? "group-hover:rotate-45 transition-transform shrink-0" : "shrink-0"}>
                      <Icon name="Gauge" size={24} />
                    </div>
                    <span className="truncate">INITIALIZE REPORT</span>
                  </button>
                </div>
              </div>

              {/* Report */}
              {showReport && stats ? (
                <div
                  ref={reportRef}
                  className="mt-16 sm:mt-24 animate-in fade-in slide-in-from-top-8 duration-700 bg-[var(--panel)] border-4 sm:border-8 border-[var(--line)] p-4 sm:p-10 shadow-[0_20px_50px_rgba(0,0,0,1)] relative"
                >
                  <div className="absolute top-0 right-0 bg-[var(--line)] text-zinc-400 font-mono text-[8px] sm:text-[10px] px-2 sm:px-3 py-1 font-bold z-10 hidden sm:block">
                    SEC. D - PRINT OUT
                  </div>

                  <div className="mb-10 sm:mb-16 text-center border-b-4 border-[var(--line)] pb-8 sm:pb-10">
                    <h2 className="text-3xl sm:text-5xl md:text-6xl font-black uppercase tracking-tighter italic text-white mb-4 drop-shadow-[2px_2px_0px_var(--amber)] break-words">
                      Impact <span className="text-[var(--amber)]">Graphs</span>
                    </h2>
                    <p className="text-xs sm:text-sm md:text-base font-mono text-zinc-400 tracking-widest uppercase font-bold break-words px-2">
                      Telemetry readouts for{" "}
                      <span className="text-white bg-[var(--line)] px-2 mt-2 sm:mt-0 inline-block leading-loose">
                        {view === "custom"
                          ? customVehicle.label
                          : `${selectedVehicle?.year ?? ""} ${selectedVehicle?.make ?? ""} ${selectedVehicle?.model ?? ""}`.trim()}
                      </span>
                    </p>
                    <p className="mt-4 text-[10px] sm:text-xs font-mono uppercase tracking-widest font-black text-zinc-500">
                      Hover graphs to inspect at distance. Curves assume constant efficiency.
                    </p>
                  </div>

                  {/* Summary cards */}
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 sm:gap-6">
                    <SummaryCard title="CO2 Total" value={`${formatNumber(stats.totalCO2_kg, 2)} kg`} accent="text-[var(--amber)]" />
                    <SummaryCard title="Cost Total" value={formatMoney(stats.totalCost, units.currency)} accent="text-[var(--teal)]" />
                    <SummaryCard
                      title={activeMode === "EV" ? "Energy" : "Fuel"}
                      value={
                        activeMode === "EV"
                          ? `${formatNumber(stats.kwh, 2)} kWh`
                          : `${formatNumber(stats.fuelDisplay, 2)} ${stats.fuelUnit}`
                      }
                      accent="text-white"
                    />
                  </div>

                  {/* Vehicle model */}
                  <div className="mt-10 bg-black border-4 border-[var(--line)] p-4 sm:p-8">
                    <div className="flex items-center justify-between gap-3 flex-wrap border-b-2 border-zinc-800 pb-4">
                      <div className="flex items-center gap-3 text-white">
                        <Icon name="Car" size={24} className="text-[var(--amber)] shrink-0" />
                        <h3 className="text-sm sm:text-lg md:text-xl font-black uppercase tracking-widest text-white leading-tight">
                          Vehicle Model (Stylized)
                        </h3>
                      </div>
                      <div className="text-[10px] sm:text-xs font-mono uppercase tracking-widest font-black text-zinc-400">
                        {activeMode} • graph scale: {formatNumber(maxGraphDisplay, 0)} {graphUnitLabel}
                      </div>
                    </div>

                    <div className="mt-6 grid grid-cols-1 lg:grid-cols-3 gap-4 sm:gap-6 items-stretch">
                      <div className="lg:col-span-2">
                        <EcoCarModel
                          label={
                            view === "custom"
                              ? customVehicle.label
                              : `${selectedVehicle?.year ?? ""} ${selectedVehicle?.make ?? ""} ${selectedVehicle?.model ?? ""}`.trim()
                          }
                          mode={activeMode}
                          make={selectedVehicle?.make || ""}
                          year={selectedVehicle?.year || ""}
                          model={selectedVehicle?.model || ""}
                        />
                      </div>
                      <div className="bg-[var(--panel)] border-2 border-[var(--line)] p-4">
                        <div className="text-[10px] sm:text-xs font-mono uppercase tracking-widest font-black text-zinc-500">
                          Useful metrics (per mile)
                        </div>
                        <div className="mt-4 space-y-3">
                          <KeyValue k="CO2 intensity" v={`${formatNumber(stats.co2PerMile_kg * 1000, 0)} gCO2/mi`} accent="text-[var(--amber)]" />
                          <KeyValue k="Cost intensity" v={`${formatMoney(stats.costPerMile, units.currency)}/mi`} accent="text-[var(--teal)]" />
                          {activeMode === "EV" ? (
                            <KeyValue k="Energy intensity" v={`${formatNumber(stats.kwhPerMile, 3)} kWh/mi`} accent="text-white" />
                          ) : (
                            <KeyValue k="Fuel intensity" v={`${formatNumber(stats.fuelGalPerMile, 3)} gal/mi`} accent="text-white" />
                          )}
                          <div className="pt-3 border-t border-zinc-800 text-[10px] sm:text-xs font-mono uppercase tracking-widest font-black text-zinc-500">
                            Tip: “per mile” stays useful as you change distance.
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Graphs */}
                  <div className="mt-10 grid grid-cols-1 lg:grid-cols-2 gap-8 sm:gap-12">
                    <LineGraph
                      title="Emissions vs Distance (kg CO2)"
                      accent="var(--amber)"
                      maxXDisplay={maxGraphDisplay}
                      xUnit={graphUnitLabel}
                      onHover={handleGraphHover}
                      onLeave={clearGraphHover}
                      hoverDistMi={hoverDistMi}
                      maxXMi={MAX_GRAPH_MI}
                      lines={[
                        { label: "Target", color: "var(--amber)", yAtMax: stats.co2PerMile_kg * MAX_GRAPH_MI },
                        { label: "Hybrid (benchmark)", color: "var(--blue)", dashed: true, yAtMax: (200 / 1000) * MAX_GRAPH_MI },
                        { label: "Sedan (benchmark)", color: "var(--teal)", dashed: true, yAtMax: (411 / 1000) * MAX_GRAPH_MI },
                        { label: "Truck (benchmark)", color: "var(--red)", dashed: true, yAtMax: (550 / 1000) * MAX_GRAPH_MI },
                      ]}
                      tooltip={{
                        render: (dMi) => {
                          const dDisplay = units.distance === "km" ? dMi / MI_PER_KM : dMi;
                          const target = stats.co2PerMile_kg * dMi;
                          return {
                            title: `AT ${formatNumber(dDisplay, 1)} ${graphUnitLabel}`,
                            rows: [
                              { label: "TARGET", value: `${formatNumber(target, 1)} kg`, color: "var(--amber)", strong: true },
                              { label: "TRUCK", value: `${formatNumber((550 / 1000) * dMi, 1)} kg`, color: "var(--red)" },
                              { label: "SEDAN", value: `${formatNumber((411 / 1000) * dMi, 1)} kg`, color: "var(--teal)" },
                              { label: "HYBRID", value: `${formatNumber((200 / 1000) * dMi, 1)} kg`, color: "var(--blue)" },
                            ],
                          };
                        },
                      }}
                    />

                    <LineGraph
                      title="Cost vs Distance"
                      accent="var(--teal)"
                      maxXDisplay={maxGraphDisplay}
                      xUnit={graphUnitLabel}
                      onHover={handleGraphHover}
                      onLeave={clearGraphHover}
                      hoverDistMi={hoverDistMi}
                      maxXMi={MAX_GRAPH_MI}
                      money
                      currency={units.currency}
                      lines={[
                        { label: "Target", color: activeMode === "EV" ? "var(--sky)" : "#ffffff", yAtMax: stats.costPerMile * MAX_GRAPH_MI },
                        { label: "Avg Gas (25 MPG)", color: "var(--teal)", dashed: true, yAtMax: stats.benchmarks.avgGasCostPerMile * MAX_GRAPH_MI },
                      ]}
                      tooltip={{
                        render: (dMi) => {
                          const dDisplay = units.distance === "km" ? dMi / MI_PER_KM : dMi;
                          const target = stats.costPerMile * dMi;
                          const avg = stats.benchmarks.avgGasCostPerMile * dMi;
                          return {
                            title: `AT ${formatNumber(dDisplay, 1)} ${graphUnitLabel}`,
                            rows: [
                              {
                                label: "TARGET",
                                value: formatMoney(target, units.currency),
                                color: activeMode === "EV" ? "var(--sky)" : "#ffffff",
                                strong: true,
                              },
                              { label: "AVG GAS", value: formatMoney(avg, units.currency), color: "var(--teal)" },
                            ],
                          };
                        },
                      }}
                    />

                    <BarCompare
                      title="Annual footprint (metric tons)"
                      subtitle="250 commute-days baseline"
                      items={[
                        { label: "Target", color: "var(--amber)", value: (stats.totalCO2_kg * 250) / 1000 },
                        { label: "Sedan", color: "var(--teal)", value: (stats.benchmarks.sedanCO2_kg * 250) / 1000 },
                        { label: "Truck", color: "var(--red)", value: (stats.benchmarks.truckCO2_kg * 250) / 1000 },
                      ]}
                    />

                    <BarCompare
                      title={`Cost per 100 ${graphUnitLabel}`}
                      subtitle="Normalized running cost"
                      money
                      currency={units.currency}
                      items={[
                        { label: "Target", color: activeMode === "EV" ? "var(--sky)" : "#ffffff", value: stats.costPerMile * 100 },
                        { label: "Avg Gas (25 MPG)", color: "var(--teal)", value: stats.benchmarks.avgGasCostPerMile * 100 },
                      ]}
                    />
                  </div>

                  {/* Compare table (if any) */}
                  {compareStats?.length ? (
                    <div className="mt-10 bg-black border-4 border-[var(--line)] p-4 sm:p-8">
                      <div className="flex items-center gap-3 mb-6 text-white border-b-2 border-zinc-800 pb-4">
                        <Icon name="BarChart" size={24} className="text-[var(--amber)] shrink-0" />
                        <h3 className="text-sm sm:text-lg md:text-xl font-black uppercase tracking-widest text-white leading-tight">
                          Compare Snapshot
                        </h3>
                      </div>
                      <div className="overflow-auto">
                        <table className="w-full text-left text-xs sm:text-sm">
                          <thead className="text-zinc-400 uppercase tracking-widest text-[10px] sm:text-xs font-black">
                            <tr>
                              <th className="py-2 pr-3">Vehicle</th>
                              <th className="py-2 pr-3">Mode</th>
                              <th className="py-2 pr-3">CO2 (kg)</th>
                              <th className="py-2 pr-3">Cost</th>
                              <th className="py-2 pr-3">Resource</th>
                            </tr>
                          </thead>
                          <tbody className="text-white font-bold">
                            {compareStats.map((c) => (
                              <tr key={c.key} className="border-t border-zinc-800">
                                <td className="py-2 pr-3 whitespace-nowrap">{c.label}</td>
                                <td className="py-2 pr-3">{c.mode}</td>
                                <td className="py-2 pr-3 text-[var(--amber)] font-black">{formatNumber(c.stats.totalCO2_kg, 2)}</td>
                                <td className="py-2 pr-3 text-[var(--teal)] font-black">{formatMoney(c.stats.totalCost, units.currency)}</td>
                                <td className="py-2 pr-3">
                                  {c.mode === "EV"
                                    ? `${formatNumber(c.stats.kwh, 2)} kWh`
                                    : `${formatNumber(c.stats.fuelDisplay, 2)} ${c.stats.fuelUnit}`}
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  ) : null}

                  {/* Print helper */}
                  <div className="mt-10 flex flex-wrap gap-3 justify-center">
                    <button
                      onClick={() => window.print()}
                      className="focus-ring bg-white text-black font-black uppercase tracking-widest text-xs sm:text-sm py-3 px-4 border-2 border-black shadow-[4px_4px_0px_#000]"
                    >
                      Print
                    </button>
                    <button
                      onClick={() => setShowReport(false)}
                      className="focus-ring bg-black border-2 border-[var(--line)] hover:border-[var(--amber)] text-white font-black uppercase tracking-widest text-xs sm:text-sm py-3 px-4"
                    >
                      Close Report
                    </button>
                  </div>
                </div>
              ) : null}
            </div>
          </div>
        );
      };

      const inferModeFromFuelType = (fuelType) => {
        const ft = String(fuelType ?? "").toLowerCase();
        if (ft.includes("elec") || ft.includes("ev")) return "EV";
        if (ft.includes("hybrid")) return "Hybrid";
        return "ICE";
      };

      const VehicleCard = ({ vehicle, mode, logoError, setLogoError }) => {
        return (
          <div className="mt-8 sm:mt-12 bg-black border-4 border-[var(--line)] p-5 sm:p-8 relative">
            <div className="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-[var(--amber)]"></div>
            <div className="absolute top-0 right-0 w-4 h-4 border-t-2 border-r-2 border-[var(--amber)]"></div>
            <div className="absolute bottom-0 left-0 w-4 h-4 border-b-2 border-l-2 border-[var(--amber)]"></div>
            <div className="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-[var(--amber)]"></div>

            <div className="relative w-full h-32 sm:h-48 border-2 border-[var(--line)] crt-screen mb-6 sm:mb-8 flex items-center justify-center overflow-hidden shadow-[0_0_20px_rgba(245,158,11,0.3)] p-2">
              {!logoError ? (
                <img
                  src={getLogoUrl(vehicle.make)}
                  alt={`${vehicle.make} logo`}
                  onError={() => setLogoError(true)}
                  className="absolute w-24 h-24 sm:w-40 sm:h-40 opacity-80"
                  style={{
                    objectFit: "contain",
                    filter:
                      "brightness(0) saturate(100%) invert(62%) sepia(91%) saturate(2258%) hue-rotate(1deg) brightness(103%) contrast(95%) drop-shadow(0 0 10px rgba(245,158,11,0.6))",
                  }}
                />
              ) : (
                <div className="absolute text-[var(--amber)] font-black uppercase tracking-widest text-sm sm:text-lg">
                  {vehicle.make}
                </div>
              )}
              <div className="z-10 flex flex-col items-center justify-center w-full max-w-[90%] mix-blend-plus-lighter px-2 sm:px-4 bg-black/80 py-2 sm:py-4 border border-[var(--amber)] [container-type:inline-size]">
                <div className="font-black text-white tracking-[0.1em] sm:tracking-[0.2em] uppercase w-full break-words text-center drop-shadow-md text-[clamp(1rem,8cqi,2.5rem)] leading-tight">
                  {vehicle.make}
                </div>
                <div className="font-mono text-[var(--amber)] tracking-widest w-full break-words text-center font-bold text-[clamp(0.75rem,5cqi,1.5rem)] mt-1">
                  {vehicle.model}
                </div>
              </div>
            </div>

            <div className="mb-6">
              <EcoCarModel
                label={`${vehicle.year} ${vehicle.make} ${vehicle.model}`}
                mode={mode}
                make={vehicle.make}
                year={vehicle.year}
                model={vehicle.model}
                compact
              />
            </div>

            <div className="flex flex-col md:flex-row justify-between items-start gap-4">
              <div className="flex-1 min-w-0 pr-0 md:pr-4 [container-type:inline-size]">
                <div className="text-[10px] sm:text-xs font-black text-zinc-500 uppercase tracking-widest mb-1">Subject Profile</div>
                <h3 className="font-black italic uppercase leading-none text-white drop-shadow-md break-words mt-1 text-[clamp(1.5rem,10cqi,3rem)]">
                  {vehicle.year} <br />
                  <span className="text-[var(--amber)]">{vehicle.model}</span>
                </h3>
                <div className="mt-3 text-[10px] sm:text-xs font-mono uppercase tracking-widest font-black text-zinc-500">
                  MPG: <span className="text-white">{vehicle.mpg || "?"}</span> | Fuel: <span className="text-white">{vehicle.fuelType}</span>
                </div>
              </div>
              <div className="shrink-0 text-left md:text-right mt-2 md:mt-0 w-full md:w-auto">
                <div className="text-[10px] sm:text-xs font-mono text-zinc-500 uppercase mb-1 font-black">Powertrain</div>
                <div className="text-sm sm:text-base md:text-xl font-black uppercase text-black bg-[var(--amber)] px-3 sm:px-4 py-2 border-2 border-[var(--amber2)] inline-block shadow-[2px_2px_0px_#fff] whitespace-nowrap">
                  {vehicle.fuelType}
                </div>
              </div>
            </div>
          </div>
        );
      };

      const BenchItem = ({ label, value, color }) => (
        <div className="bg-[var(--panel)] border-2 border-[var(--line)] p-3">
          <div className="text-[10px] sm:text-xs uppercase tracking-widest font-black text-zinc-400">{label}</div>
          <div className={"mt-2 font-mono font-black text-lg sm:text-xl " + color}>{value}</div>
        </div>
      );

      const KeyValue = ({ k, v, accent = "text-white" }) => (
        <div className="flex items-start justify-between gap-4">
          <div className="text-[10px] sm:text-xs font-mono uppercase tracking-widest font-black text-zinc-500">{k}</div>
          <div className={"text-xs sm:text-sm font-mono font-black text-right " + accent}>{v}</div>
        </div>
      );

      const EcoCarModel = ({ label, mode, make, year, model, compact = false }) => {
        const accent = mode === "EV" ? "var(--sky)" : mode === "Hybrid" ? "var(--teal)" : "var(--amber)";
        const glow = mode === "EV" ? "rgba(34,211,238,0.6)" : mode === "Hybrid" ? "rgba(52,211,153,0.55)" : "rgba(34,197,94,0.55)";
        const tint = mode === "EV" ? "#22d3ee" : mode === "Hybrid" ? "#34d399" : "#22c55e";
        const [imgOk, setImgOk] = useState(true);
        const [photoUrl, setPhotoUrl] = useState(null);
        const [imgSource, setImgSource] = useState("commons"); // commons | unsplash
        const unsplashUrl = useMemo(() => getCarPhotoUrl({ year, make, model }), [year, make, model]);
        const triedUnsplashRef = useRef(false);

        useEffect(() => {
          let cancelled = false;
          const key = commonsCacheKey(year, make, model);
          setImgOk(true);
          setImgSource("commons");
          triedUnsplashRef.current = false;

          (async () => {
            try {
              const cached = localStorage.getItem(key);
              if (cached) {
                if (!cancelled) setPhotoUrl(cached);
                return;
              }

              const url = await fetchCommonsCarThumb({ year, make, model, thumbPx: 1400 });
              if (cancelled) return;
              if (url) {
                setPhotoUrl(url);
                try {
                  localStorage.setItem(key, url);
                } catch {}
              } else {
                // Fall back to Unsplash source.
                setImgSource("unsplash");
                setPhotoUrl(unsplashUrl);
                triedUnsplashRef.current = true;
              }
            } catch {
              if (cancelled) return;
              setImgSource("unsplash");
              setPhotoUrl(unsplashUrl);
              triedUnsplashRef.current = true;
            }
          })();

          return () => {
            cancelled = true;
          };
        }, [year, make, model, unsplashUrl]);

        return (
          <div className={"bg-black border-4 border-[var(--line)] crt-screen overflow-hidden " + (compact ? "p-3" : "p-5 sm:p-6")}>
            <div className="flex items-center justify-between gap-3">
              <div className="min-w-0">
                <div className="text-[10px] sm:text-xs font-mono uppercase tracking-widest font-black text-zinc-500">MODEL_VIEW</div>
                <div className="mt-1 text-sm sm:text-base font-black text-white truncate">{label}</div>
              </div>
              <div className="shrink-0">
                <span className="text-[10px] sm:text-xs font-mono uppercase tracking-widest font-black text-black px-2 py-1" style={{ background: tint }}>
                  {mode}
                </span>
              </div>
            </div>

            <div className={"mt-4 relative " + (compact ? "h-28" : "h-40 sm:h-48")}>
              <div
                className="absolute inset-0"
                style={{
                  background: `radial-gradient(closest-side at 55% 55%, ${glow}, rgba(0,0,0,0) 70%)`,
                  filter: "blur(10px)",
                  opacity: 0.9,
                }}
              />

              {/* Real photo (best-effort). If it fails, we show the SVG model below. */}
              {imgOk && photoUrl ? (
                <img
                  src={photoUrl}
                  alt={label ? `${label} photo` : "Car photo"}
                  className="absolute inset-0 w-full h-full object-cover opacity-80"
                  style={{
                    filter:
                      "contrast(1.05) saturate(0.95) brightness(0.95) drop-shadow(0 0 18px rgba(34,197,94,0.25))",
                  }}
                  onError={() => {
                    // If Commons image fails to load, try Unsplash once before giving up to SVG.
                    if (!triedUnsplashRef.current) {
                      triedUnsplashRef.current = true;
                      setImgSource("unsplash");
                      setPhotoUrl(unsplashUrl);
                      return;
                    }
                    setImgOk(false);
                  }}
                />
              ) : null}

              {/* Image source tag (subtle) */}
              <div className="absolute left-3 top-3 bg-black/70 border border-[var(--line)] px-2 py-1 text-[9px] font-mono uppercase tracking-widest font-black text-zinc-300">
                IMG: {imgSource}
              </div>

              {/* Brand mark overlay */}
              {make ? (
                <img
                  src={getLogoUrl(make)}
                  alt=""
                  className="absolute right-3 top-3 w-12 h-12 opacity-80 pointer-events-none"
                  style={{
                    objectFit: "contain",
                    filter:
                      "brightness(0) saturate(100%) invert(78%) sepia(28%) saturate(900%) hue-rotate(75deg) brightness(105%) contrast(92%)",
                  }}
                  onError={() => {}}
                />
              ) : null}

              {/* Fallback SVG model */}
              {!imgOk ? (
                <svg viewBox="0 0 600 220" className="absolute inset-0 w-full h-full">
                  <defs>
                    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
                      <stop offset="0" stopColor="#0b1220" />
                      <stop offset="0.55" stopColor={tint} stopOpacity="0.45" />
                      <stop offset="1" stopColor="#0b1220" />
                    </linearGradient>
                    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
                      <stop offset="0" stopColor="#22c55e" stopOpacity="0.15" />
                      <stop offset="0.6" stopColor="#22d3ee" stopOpacity="0.18" />
                      <stop offset="1" stopColor="#ffffff" stopOpacity="0.08" />
                    </linearGradient>
                    <filter id="glow">
                      <feGaussianBlur stdDeviation="3.5" result="blur" />
                      <feMerge>
                        <feMergeNode in="blur" />
                        <feMergeNode in="SourceGraphic" />
                      </feMerge>
                    </filter>
                  </defs>

                  <path d="M60 175 H540" stroke="rgba(255,255,255,0.18)" strokeWidth="2" strokeDasharray="8 10" />

                  <g filter="url(#glow)">
                    <circle cx="180" cy="175" r="30" fill="#030712" stroke={accent} strokeWidth="3" />
                    <circle cx="180" cy="175" r="12" fill="none" stroke="rgba(255,255,255,0.35)" strokeWidth="2" />
                    <circle cx="420" cy="175" r="30" fill="#030712" stroke={accent} strokeWidth="3" />
                    <circle cx="420" cy="175" r="12" fill="none" stroke="rgba(255,255,255,0.35)" strokeWidth="2" />
                  </g>

                  <path
                    d="M110 160
                       C130 125, 165 105, 210 102
                       L250 100
                       C275 78, 312 66, 350 66
                       L410 66
                       C448 66, 478 76, 505 95
                       L540 120
                       C552 128, 556 138, 556 150
                       L556 160
                       L110 160 Z"
                    fill="url(#body)"
                    stroke={accent}
                    strokeWidth="3"
                    filter="url(#glow)"
                  />

                  <path
                    d="M265 96
                       C283 80, 307 72, 335 72
                       L410 72
                       C432 72, 450 78, 468 90
                       L488 105
                       L300 105 Z"
                    fill="url(#glass)"
                    stroke="rgba(255,255,255,0.12)"
                  />

                  <path d="M140 150 H520" stroke={accent} strokeOpacity="0.65" strokeWidth="2" />

                  <text x="130" y="140" fill="rgba(255,255,255,0.55)" fontFamily="monospace" fontSize="12" fontWeight="700">
                    {mode === "EV" ? "ZERO-TAILPIPE" : mode === "Hybrid" ? "BLENDED-DRIVE" : "COMBUSTION"}
                  </text>
                </svg>
              ) : null}

            </div>
          </div>
        );
      };

      const LineGraph = ({
        title,
        accent,
        maxXDisplay,
        xUnit,
        lines,
        hoverDistMi,
        maxXMi,
        onHover,
        onLeave,
        tooltip,
        money = false,
        currency = "USD",
      }) => {
        const maxY = Math.max(1, ...lines.map((l) => l.yAtMax)) * 1.15;
        const xToSvg = (x) => (x / maxXMi) * 500;
        const yToSvg = (y) => 200 - (y / maxY) * 200;

        const dMi = hoverDistMi ?? null;
        const tooltipData = dMi !== null ? tooltip?.render(dMi) : null;
        const hoverX = dMi !== null ? xToSvg(dMi) : null;

        return (
          <div className="bg-black border-4 border-[var(--line)] p-4 sm:p-8 relative">
            <div className="flex items-center gap-3 mb-6 sm:mb-10 text-white border-b-2 border-zinc-800 pb-4">
              <Icon name="TrendingUp" size={24} className="shrink-0" style={{ color: accent }} />
              <h3 className="text-sm sm:text-lg md:text-xl font-black uppercase tracking-widest text-white leading-tight">{title}</h3>
            </div>

            <div
              className="relative w-full aspect-[4/3] sm:aspect-[16/9] border-l-2 border-b-2 border-zinc-600 mb-6 bg-[var(--bg)] cursor-crosshair crt-screen"
              onMouseMove={onHover}
              onMouseLeave={onLeave}
            >
              <div className="absolute top-[25%] w-full border-t border-zinc-800 border-dashed"></div>
              <div className="absolute top-[50%] w-full border-t border-zinc-800 border-dashed"></div>
              <div className="absolute top-[75%] w-full border-t border-zinc-800 border-dashed"></div>

              <svg viewBox="0 0 500 200" className="w-full h-full overflow-visible relative z-10">
                {lines.map((l) => (
                  <path
                    key={l.label}
                    d={`M 0 200 L 500 ${yToSvg(l.yAtMax)}`}
                    stroke={l.color}
                    strokeWidth={l.dashed ? 3 : 6}
                    strokeDasharray={l.dashed ? "6,6" : "0"}
                    fill="none"
                    className={!l.dashed ? "drop-shadow-[0_0_10px_rgba(34,197,94,0.45)]" : ""}
                  />
                ))}

                {hoverX !== null ? (
                  <g className="transition-all duration-75 ease-out" transform={`translate(${Math.min(500, hoverX)}, 0)`}>
                    <line x1="0" y1="0" x2="0" y2="200" stroke="white" strokeWidth="2" strokeDasharray="4,4" className="opacity-80" />
                    {lines.map((l) => {
                      const y = l.yAtMax * ((hoverDistMi ?? 0) / maxXMi);
                      return <circle key={l.label} cx="0" cy={yToSvg(y)} r={l.dashed ? 5 : 8} fill={l.color} stroke="black" strokeWidth="2" />;
                    })}
                  </g>
                ) : null}
              </svg>

              <div className="absolute -bottom-6 right-0 text-[10px] sm:text-xs text-zinc-500 font-mono font-bold uppercase">
                {formatNumber(maxXDisplay, 0)} {xUnit}
              </div>
              <div
                className="absolute top-2 left-2 text-[10px] sm:text-xs font-mono font-bold bg-black px-2 py-1 border border-[var(--line)] whitespace-nowrap"
                style={{ color: accent }}
              >
                {money ? `${formatMoney(maxY, currency)} MAX` : `${formatNumber(maxY, 0)} MAX`}
              </div>

              {tooltipData ? (
                <div
                  className="absolute top-4 pointer-events-none bg-black border-2 border-white p-3 sm:p-4 z-50 min-w-[160px] sm:min-w-[200px] shadow-[4px_4px_0px_var(--amber)]"
                  style={{
                    left: `${Math.min(100, ((hoverDistMi ?? 0) / maxXMi) * 100)}%`,
                    transform: `translateX(${(hoverDistMi ?? 0) / maxXMi > 0.6 ? "-110%" : "10%"})`,
                  }}
                >
                  <div className="text-[10px] sm:text-xs font-black text-white mb-2 sm:mb-3 border-b-2 border-zinc-800 pb-1 sm:pb-2 uppercase tracking-widest whitespace-nowrap">
                    {tooltipData.title}
                  </div>
                  <div className="space-y-1 sm:space-y-2 text-[10px] sm:text-xs font-bold font-mono">
                    {tooltipData.rows.map((r) => (
                      <div
                        key={r.label}
                        className={
                          "flex justify-between gap-4 " +
                          (r.strong ? "text-[10px] sm:text-sm font-black border-t border-zinc-800 pt-1 sm:pt-2 mt-1 sm:mt-2" : "")
                        }
                        style={{ color: r.color }}
                      >
                        <span>{r.label}:</span>
                        <span>{r.value}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ) : null}
            </div>

            <div className="flex flex-wrap items-center gap-2 sm:gap-6 text-[8px] sm:text-xs font-black uppercase tracking-widest mt-8 bg-[var(--panel)] p-3 sm:p-4 border-2 border-[var(--line)]">
              {lines.map((l) => (
                <div key={l.label} className="flex items-center gap-2 w-full sm:w-auto">
                  <div
                    className="w-3 sm:w-4 h-2 shrink-0"
                    style={{ background: l.color, borderTop: l.dashed ? "2px dashed #000" : "none" }}
                  ></div>
                  <span className="text-zinc-200 truncate">{l.label}</span>
                </div>
              ))}
            </div>
          </div>
        );
      };

      const BarCompare = ({ title, subtitle, items, money = false, currency = "USD" }) => {
        const max = Math.max(1, ...items.map((i) => i.value)) * 1.15;
        return (
          <div className="bg-black border-4 border-[var(--line)] p-4 sm:p-8 relative">
            <div className="flex items-center gap-3 mb-6 sm:mb-10 text-white border-b-2 border-zinc-800 pb-4">
              <Icon name="BarChart" size={24} className="text-[var(--amber)] shrink-0" />
              <div className="min-w-0">
                <h3 className="text-sm sm:text-lg md:text-xl font-black uppercase tracking-widest text-white leading-tight truncate">{title}</h3>
                <div className="text-[10px] sm:text-xs font-mono uppercase tracking-widest font-black text-zinc-500 mt-1">{subtitle}</div>
              </div>
            </div>

            <div className="relative w-full aspect-[4/3] sm:aspect-[16/9] border-l-2 border-b-2 border-zinc-600 bg-[var(--bg)] crt-screen flex items-end justify-around px-2 sm:px-8 pb-0 pt-10">
              <div className="absolute top-[25%] w-full left-0 border-t border-zinc-800 border-dashed z-0"></div>
              <div className="absolute top-[50%] w-full left-0 border-t border-zinc-800 border-dashed z-0"></div>
              <div className="absolute top-[75%] w-full left-0 border-t border-zinc-800 border-dashed z-0"></div>

              {items.map((it) => (
                <div key={it.label} className="relative w-1/3 flex flex-col items-center justify-end h-full z-10 px-1">
                  <span className="absolute -top-6 sm:-top-8 text-[10px] sm:text-lg font-black" style={{ color: it.color }}>
                    {money ? formatMoney(it.value, currency) : formatNumber(it.value, 1)}
                  </span>
                  <div
                    className="w-full transition-all duration-700 border-t-2 sm:border-t-4 border-white/30"
                    style={{
                      height: `${Math.max(1, (it.value / max) * 100)}%`,
                      background: it.color,
                      boxShadow: "0 0 20px rgba(34,197,94,0.25)",
                      opacity: it.label === "Truck" ? 0.82 : 0.92,
                    }}
                  ></div>
                  <span className="absolute -bottom-6 sm:-bottom-8 text-[8px] sm:text-xs font-black text-zinc-300 uppercase text-center w-full truncate px-1">
                    {it.label}
                  </span>
                </div>
              ))}
            </div>
          </div>
        );
      };

      const MetricMini = ({ label, value, accent }) => (
        <div className="bg-[var(--panel)] border-2 border-[var(--line)] p-3">
          <div className="text-[10px] uppercase tracking-widest font-black text-zinc-400">{label}</div>
          <div className={"mt-2 font-mono font-black text-sm sm:text-base break-words " + accent}>{value}</div>
        </div>
      );

      const SummaryCard = ({ title, value, accent }) => (
        <div className="bg-black border-4 border-[var(--line)] p-4 sm:p-6">
          <div className="text-[10px] sm:text-xs font-mono uppercase tracking-widest font-black text-zinc-500">
            {title}
          </div>
          <div className={"mt-3 text-2xl sm:text-3xl font-black font-mono " + accent}>{value}</div>
        </div>
      );

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
